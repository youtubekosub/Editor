<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f7;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 { color: #007acc; margin-bottom: 10px; }
        p { color: #444; line-height: 1.6; }
        ul { list-style: none; padding: 0; }
        li {
            background: #f0f7ff;
            margin: 5px 0;
            padding: 10px;
            border-radius: 8px;
            color: #005a9e;
            font-weight: bold;
        }
        .footer { margin-top: 20px; font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <div class="card">
        <h1>{{ title }}</h1>
        <p>{{ message }}</p>
        <ul>
            {% for feature in features %}
            <li>{{ feature }}</li>
            {% endfor %}
        </ul>
        <div class="footer">Ready for Render Deployment</div>
    </div>
</body>
</html>
